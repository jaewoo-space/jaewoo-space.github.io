- title: "Supply Chain Management for Maintenance of Satellite Constellation"
  image: "/assets/img/research_con_maintenance.png"
  caption: "Overview of various maintenance strategies for satellite mega-constellation."
  description: "Maintenance for satellite constellations is becoming an increasingly critical issue in the space industry, as it shapes demand for satellite manufacturing, materials, and launch services while directly affecting constellation availability and the ability to serve markets such as communications, Earth observation, and navigation. This research approaches constellation maintenance from a supply chain management perspective, examining how decisions made by stakeholders interact across the system. We develop and evaluate maintenance strategies under fixed supply chain structures, identifying critical bottlenecks and analyzing how solutions for one stakeholder influence other key players and the overall performance of the supply chain."
  related_papers:
    - "Replenishment Strategy for Satellite Constellation with Dual Supply Modes"
    - "On-Orbit Servicing-Integrated Maintenance Strategy for Satellite Constellation"
    - "Joint Replenishment Strategy for Multiple Satellite Constellations with Shared Launch Opportunities"

- title: "Assessment of Design & Operations of Space Systems with On-Orbit Servicing"
  image: "/assets/img/research_geo_architecting.png"
  caption: "Past and future of GEO communication satellite driven by on-orbit servicing."
  description: "On-orbit servicing (OOS) is an emerging capability that can reshape the future of space systems by enabling in-space refueling, repair, and upgrades. These services can extend the operational life of satellites while opening new design and operations paradigms that move beyond conventional mission architectures. However, market adoption remains challenging due to technological complexity, safety concerns, and a chicken-and-egg problem where operators hesitate to embrace OOS before the value of OOS is clearly demonstrated. This research assesses how OOS can change the value of space systems by influencing system architecture, lifecycle operations, and the broader design philosophy of future space missions."
  related_papers:
    - "System Architecting for GEO Communication Satellite Considering On-Orbit Refueling"

